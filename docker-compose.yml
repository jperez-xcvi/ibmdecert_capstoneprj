services:
  # --- MONGODB ---
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    restart: ${RESTART_POLICY}
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - db_network

  # --- MYSQL ---
  mysql:
    image: mysql:latest
    container_name: mysql_container
    restart: ${RESTART_POLICY}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - db_network

  # --- PHPMYADMIN ---
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_container
    restart: ${RESTART_POLICY}
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    ports:
      - "${PHPMYADMIN_PORT}:80"
    depends_on:
      - mysql
    networks:
      - db_network

  # --- POSTGRESQL ---
  postgresql:
    image: postgres:latest
    container_name: postgresql_container
    restart: ${RESTART_POLICY}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # CORRECCIÓN: Se monta en /var/lib/postgresql para cumplir con Postgres 18+
      - postgres_data:/var/lib/postgresql
    networks:
      - db_network

  # --- PGADMIN ---
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_container
    restart: ${RESTART_POLICY}
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_DISABLE_POSTGRES_PASSWORD_BOOTSTRAP: 'true'
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgresql
    networks:
      - db_network

networks:
  db_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  mysql_data:
    driver: local
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local